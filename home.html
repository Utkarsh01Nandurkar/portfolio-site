<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utkarsh Nandurkar • DevOps</title>
  <meta name="description" content="DevOps and Cloud Engineer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/splash.css" />
  <script>
    // Auto enter after short animation
    window.addEventListener('load', () => {
      setTimeout(() => { window.location.href = 'home.html'; }, 2200);
    });
  </script>
</head>
<body class="splash-body">
  <div class="splash-wrap" role="main">
    <!-- DevOps Infinity Loop (glow pulse) -->
    <svg class="devops-loop" viewBox="0 0 600 300" aria-hidden="true">
      <defs>
        <filter id="tealGlow">
          <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path d="
        M150,150 C150,80 240,80 300,150
        C360,220 450,220 450,150
        C450,80 360,80 300,150
        C240,220 150,220 150,150 Z"
        fill="none" stroke="#00bcd4" stroke-width="6" filter="url(#tealGlow)" class="loop-stroke"/>
    </svg>

    <h1 class="splash-name">Utkarsh Nandurkar</h1>
    <p class="splash-tagline">DevOps and Cloud Engineer</p>

    <div class="splash-hint">Entering...</div>
  </div>
</body>
</html>
